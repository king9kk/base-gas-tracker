<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base Gas Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0b0d; color: #fff; font-family: Arial, sans-serif; }
    .navbar { background: #1a1b1f; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .navbar h1 { color: #0052ff; font-size: 20px; }
    .hero { text-align: center; padding: 60px 24px; }
    .hero h2 { font-size: 32px; margin-bottom: 12px; }
    .hero p { color: #888; font-size: 16px; }
    .gas-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; max-width: 600px; margin: 40px auto; padding: 0 24px; }
    .gas-card { background: #1a1b1f; border-radius: 12px; padding: 24px; text-align: center; }
    .gas-card h3 { color: #888; margin-bottom: 12px; }
    .gas-value { font-size: 28px; font-weight: bold; color: #0052ff; }
    .gas-unit { font-size: 12px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <h1>⛽ Base Gas Tracker</h1>
    <span id="last-update">Updating...</span>
  </nav>
  <div class="hero">
    <h2>Real-time Gas Prices</h2>
    <p>Track gas fees on Base network instantly</p>
  </div>
  <div class="gas-grid">
    <div class="gas-card">
      <h3>🐢 Slow</h3>
      <div class="gas-value" id="slow">—</div>
      <div class="gas-unit">Gwei</div>
    </div>
    <div class="gas-card">
      <h3>🚗 Average</h3>
      <div class="gas-value" id="average">—</div>
      <div class="gas-unit">Gwei</div>
    </div>
    <div class="gas-card">
      <h3>🚀 Fast</h3>
      <div class="gas-value" id="fast">—</div>
      <div class="gas-unit">Gwei</div>
    </div>
  </div>
</body>
</html>
